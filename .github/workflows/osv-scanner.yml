name: OSV-Scanner

# Scans pnpm-lock.yaml against the OSV vulnerability database. Used instead of
# `pnpm audit`, whose npm audit endpoint has been retired, and instead of a
# regenerated npm lockfile, which ignores pnpm overrides (e.g. the postcss
# override here) and reports false positives. OSV reads pnpm-lock.yaml directly,
# so it audits the exact versions pnpm installs. Results appear in the Security
# tab as code scanning alerts.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "18 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.0.2
