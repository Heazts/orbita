name: OSV-Scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "18 4 * * 1"

permissions: read-all

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google/osv-scanner-action@v2.0.2
        with:
          config-path: .osv-scanner.toml
